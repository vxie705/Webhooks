version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: webhook-hub-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: webhook-hub-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: webhook_hub
      POSTGRES_USER: webhook
      POSTGRES_PASSWORD: webhook_secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U webhook -d webhook_hub']
      interval: 5s
      timeout: 3s
      retries: 5

  ingestor:
    build:
      context: ../../
      dockerfile: apps/ingestor/Dockerfile
    container_name: webhook-hub-ingestor
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      INGESTOR_PORT: '3000'
      DATABASE_URL: postgresql://webhook:webhook_secret@postgres:5432/webhook_hub
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ../../
      dockerfile: apps/worker/Dockerfile
    container_name: webhook-hub-worker
    environment:
      NODE_ENV: development
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      WORKER_PORT: '3001'
      DATABASE_URL: postgresql://webhook:webhook_secret@postgres:5432/webhook_hub
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: webhook-hub-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    depends_on:
      - ingestor
      - worker

  grafana:
    image: grafana/grafana:latest
    container_name: webhook-hub-grafana
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ../grafana/dashboards:/var/lib/grafana/dashboards
      - ../grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ../grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus

volumes:
  redis-data:
  postgres-data:
  prometheus-data: