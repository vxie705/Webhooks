global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'webhook-hub'
    environment: 'development'

scrape_configs:
  - job_name: 'ingestor'
    static_configs:
      - targets: ['ingestor:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'worker'
    static_configs:
      - targets: ['worker:3001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']