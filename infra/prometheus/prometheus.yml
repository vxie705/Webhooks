global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'webhook-hub'
    environment: 'development'

scrape_configs:
  - job_name: 'ingestor'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['webhook-hub-ingestor:3000']

  - job_name: 'worker'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['webhook-hub-worker:3001']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']